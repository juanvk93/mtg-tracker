{{define "login.html"}}<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — MTG Draft Tracker</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
<div class="login-wrapper">
  <div class="login-card">
    <div class="login-icon">🔐</div>
    <h1 class="login-title">Panel de Admin</h1>
    <p class="login-sub">Introduce la contraseña para acceder</p>

    {{if .Error}}
    <div class="error-msg">{{.Error}}</div>
    {{end}}

    <form method="POST" action="/admin/login">
      <div class="form-group" style="text-align:left">
        <label class="form-label">Contraseña</label>
        <input type="password" name="password" class="form-input" placeholder="••••••••" autofocus required>
      </div>
      <button type="submit" class="btn btn-primary w-full" style="justify-content:center;margin-top:8px">
        Entrar
      </button>
    </form>

    <div style="margin-top:1.5rem">
      <a href="/" style="font-size:12px;color:var(--text-muted);text-decoration:none">← Volver al ranking</a>
    </div>
  </div>
</div>
</body>
</html>{{end}}
